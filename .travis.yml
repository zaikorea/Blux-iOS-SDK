# references:
# * https://www.objc.io/issues/6-build-tools/travis-ci/
# * https://github.com/supermarin/xcpretty#usage

osx_image: xcode7.3
language: objective-c
# cache: cocoapods
# podfile: Example/Podfile
# before_install:
# - gem install cocoapods # Since Travis is not always on latest version
# - pod install --project-directory=Example
script:
- set -o pipefail && xcodebuild test -enableCodeCoverage YES -workspace Example/BluxExample.xcworkspace -scheme BluxExample -sdk iphonesimulator9.3 ONLY_ACTIVE_ARCH=NO | xcpretty
- if [ -n "${TRAVIS_TAG:-}" ]; then ./scripts/publish.sh "${TRAVIS_TAG}"; else echo "No TRAVIS_TAG, skipping release tag validation."; fi
- pod lib lint
