name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pod-lock-freshness:
    runs-on: macos-26
    env:
      COCOAPODS_DISABLE_STATS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0.1"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.7"
          bundler-cache: true

      - name: Ensure CocoaPods version
        run: |
          CURRENT_POD_VERSION="$(bundle exec pod --version || true)"
          echo "Current CocoaPods version: $CURRENT_POD_VERSION"
          if [ "$CURRENT_POD_VERSION" != "1.16.2" ]; then
            echo "Unexpected CocoaPods version. Expected 1.16.2."
            exit 1
          fi

      - name: Check CocoaPods lock freshness
        working-directory: Example
        run: |
          bundle exec pod install --repo-update
          if ! git diff --exit-code -- Podfile.lock; then
            echo "Podfile.lock is stale. Please run 'pod install --repo-update' locally and commit updated lockfile."
            exit 1
          fi

  build:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      COCOAPODS_DISABLE_STATS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0.1"

      - name: Install iOS platform
        run: |
          # macos-26 runner에는 iOS 26 platform이 사전 설치돼 있지 않아 매번 다운로드가 필요하다.
          # 그런데 Apple 다운로드 서버 연결이 가끔 끊겨서 그대로 실패하는 일이 잦다.
          # 그래서 30초 간격으로 최대 3번 재시도한다 (이미 설치돼 있으면 다운로드는 빠르게 끝남).
          for attempt in 1 2 3; do
            if xcodebuild -downloadPlatform iOS; then
              exit 0
            fi
            echo "downloadPlatform attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          echo "downloadPlatform failed after 3 attempts"
          exit 1

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.7"
          bundler-cache: true

      - name: Ensure CocoaPods version
        run: |
          CURRENT_POD_VERSION="$(bundle exec pod --version || true)"
          echo "Current CocoaPods version: $CURRENT_POD_VERSION"
          if [ "$CURRENT_POD_VERSION" != "1.16.2" ]; then
            echo "Unexpected CocoaPods version. Expected 1.16.2."
            exit 1
          fi

      - name: Show tool versions
        run: |
          xcodebuild -version
          ruby --version
          bundle exec pod --version

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            Example/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('Example/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install CocoaPods
        working-directory: Example
        run: bundle exec pod install --deployment

      - name: Ensure CocoaPods lock sync
        working-directory: Example
        run: |
          if [ ! -f "Pods/Manifest.lock" ] || ! diff Podfile.lock Pods/Manifest.lock > /dev/null; then
            echo "Pods lock mismatch detected. Running pod install..."
            bundle exec pod install --deployment
          else
            echo "Pods lock files are in sync."
          fi

      - name: Build Example app
        run: |
          set -o pipefail
          xcodebuild -workspace Example/BluxExample.xcworkspace -scheme BluxExample -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build

      - name: Build & test Swift package (SPM)
        run: |
          set -o pipefail
          rm -rf .ci-spm-build
          mkdir -p .ci-spm-build
          cp Package.swift .ci-spm-build/
          cp -R BluxClient .ci-spm-build/
          cp -R Tests .ci-spm-build/
          cd .ci-spm-build

          # arm64 device triple 빌드 검증. 시뮬레이터(arm64-simulator)와 triple이 달라
          # device-only 컴파일 break를 따로 잡아준다.
          xcodebuild -scheme BluxClient \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO build

          # macos runner에 사전 설치된 첫 iPhone iOS 시뮬레이터를 동적으로 선택해
          # iPhone 모델/OS 버전 hardcode 없이 미래 runner에서도 그대로 동작.
          SIMULATOR_ID=$(xcrun simctl list devices available -j \
            | jq -r '[.devices | to_entries[]
                      | select(.key | test("iOS"))
                      | .value[]
                      | select(.name | startswith("iPhone"))]
                     | first | .udid')
          if [ -z "$SIMULATOR_ID" ] || [ "$SIMULATOR_ID" = "null" ]; then
            echo "No available iPhone Simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator: $SIMULATOR_ID"
          xcodebuild -scheme BluxClient \
            -destination "id=$SIMULATOR_ID" \
            CODE_SIGNING_ALLOWED=NO test

      - name: Lint podspec
        run: bundle exec pod lib lint BluxClient.podspec --allow-warnings --skip-tests --verbose
